<script>
  let DATA = null;
  let FILTERED = [];
  let ALL_CANALES = [];
  let USER_INFO = null;
  let CURRENT_CLIENTE_DETALLE = null;
  let CAL_DATA = null;
  let CAL_FILTERED = [];
  let SEG_DATA = null;
  
  const TIPOS_GESTION = {
    'nota_credito': { icon: '📄', label: 'Nota de Crédito', badge: 'badge-info', color: '#6366f1' },
    'diferencia_precio': { icon: '💲', label: 'Dif. Precio', badge: 'badge-warning', color: '#f59e0b' },
    'acuerdo_comercial': { icon: '🤝', label: 'Acuerdo Comercial', badge: 'badge-success', color: '#10b981' },
    'compromiso_pago': { icon: '💰', label: 'Compromiso Pago', badge: 'badge-purple', color: '#8B4789' }
  };
  
  function formatMoney(n, showZero = false) {
    const num = Number(n) || 0;
    if (num === 0 && !showZero) return '-';
    return '$' + num.toLocaleString('es-CL', { maximumFractionDigits: 0 });
  }
  
  function formatPct(n) { return (Number(n) || 0).toFixed(1) + '%'; }
  
  function run(fn, ...args) {
    return new Promise((resolve, reject) => {
      google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[fn](...args);
    });
  }
  
  document.querySelectorAll('.sap-nav-item[data-panel]').forEach(item => {
    item.addEventListener('click', () => {
      const panel = item.getAttribute('data-panel');
      document.querySelectorAll('.sap-nav-item[data-panel]').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      document.querySelectorAll('.sap-panel').forEach(p => p.classList.remove('active'));
      document.getElementById(panel).classList.add('active');
      if (panel === 'calendario' && !CAL_DATA) cargarCalendario();
      if (panel === 'seguimiento') cargarSeguimiento();
    });
  });
  
  function goFinanzas() { window.history.back(); }
  
  async function cargar() {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('loading');
    document.getElementById('loadingResumen').style.display = 'flex';
    document.getElementById('wrapperResumen').style.display = 'none';
    
    try {
      const opts = {
        q: document.getElementById('f-q')?.value || '',
        estado: document.getElementById('f-estado')?.value || 'todos',
        minDeuda: Number(document.getElementById('f-min')?.value) || 0,
        minDias: Number(document.getElementById('f-dias')?.value) || 0,
        sort: document.getElementById('f-sort')?.value || 'total'
      };
      
      const res = await run('apiDeudaGetResumen', opts);
      if (!res.ok) throw new Error(res.error);
      
      DATA = res;
      FILTERED = res.items || [];
      USER_INFO = res.userInfo;
      
      const canalesSet = new Set();
      FILTERED.forEach(c => (c.canales || []).forEach(ch => canalesSet.add(ch)));
      ALL_CANALES = Array.from(canalesSet).sort();
      
      renderUserBadge();
      renderCanalesCheckboxes();
      recalcularYRenderizar();
      
      document.getElementById('lastUpdateText').textContent = 'Última actualización: ' + new Date().toLocaleTimeString('es-CL');
    } catch (e) {
      console.error(e);
      showToast('Error: ' + e.message, 'error');
    } finally {
      btn.classList.remove('loading');
      document.getElementById('loadingResumen').style.display = 'none';
      document.getElementById('wrapperResumen').style.display = 'block';
    }
  }
  
  function recalcularYRenderizar() {
    const kpis = calcularKPIs(FILTERED);
    renderKPIs(kpis);
    renderVendedores(FILTERED);
    renderTabla();
    document.getElementById('count-total').textContent = FILTERED.length;
    document.getElementById('count-sobregiro').textContent = kpis.sobregirados;
  }
  
  function calcularKPIs(items) {
    const kTot = items.reduce((s, x) => s + (x.totalDeuda || 0), 0);
    const kDeudaNoDoc = items.reduce((s, x) => s + (x.deudaNoDocumentada || 0), 0);
    const kCheques = items.reduce((s, x) => s + (x.chequesCartera || 0), 0);
    const kVen = items.reduce((s, x) => s + (x.vencida || 0), 0);
    const kPV = items.reduce((s, x) => s + (x.porVencer || 0), 0);
    const kSob = items.filter(x => x.sobregirado).length;
    const docs = items.reduce((s, x) => s + (x.docs || 0), 0);
    
    return { clientes: items.length, deudaTotal: kTot, deudaNoDocumentada: kDeudaNoDoc, chequesCartera: kCheques, vencida: kVen, porVencer: kPV, pctVencida: kTot > 0 ? (kVen / kTot * 100) : 0, sobregirados: kSob, docs: docs };
  }
  
  function renderUserBadge() {
    const el = document.getElementById('userBadge');
    if (!USER_INFO) { el.innerHTML = ''; return; }
    const icon = USER_INFO.isAdmin ? '👑' : '👤';
    const role = USER_INFO.isAdmin ? 'Admin' : 'Vendedor';
    el.innerHTML = `<span class="user-badge">${icon} ${USER_INFO.canal} (${role})</span>`;
  }
  
  function renderCanalesCheckboxes() {
    const container = document.getElementById('canales-checkboxes');
    if (!ALL_CANALES.length) { container.innerHTML = '<span style="font-size:9px;opacity:.6">Sin canales</span>'; return; }
    container.innerHTML = ALL_CANALES.map(c => `<label class="filter-checkbox"><input type="checkbox" value="${c}" onchange="filterByCanales()" checked> ${c}</label>`).join('');
  }
  
  function filterByCanales() {
    const checks = document.querySelectorAll('#canales-checkboxes input:checked');
    const selected = Array.from(checks).map(c => c.value);
    if (selected.length === 0 || selected.length === ALL_CANALES.length) {
      FILTERED = DATA?.items || [];
    } else {
      FILTERED = (DATA?.items || []).filter(c => (c.canales || []).some(ch => selected.includes(ch)));
    }
    recalcularYRenderizar();
    // También filtrar calendario si hay datos
    if (CAL_DATA) { aplicarFiltrosCalendario(); }
  }
  
  function applyQuickFilters() {
    const checks = document.querySelectorAll('.sap-nav-section .filter-checkbox input:checked');
    const selected = Array.from(checks).map(c => c.value);
    const canalChecks = document.querySelectorAll('#canales-checkboxes input:checked');
    const canalesSelected = Array.from(canalChecks).map(c => c.value);
    
    let items = DATA?.items || [];
    if (canalesSelected.length > 0 && canalesSelected.length < ALL_CANALES.length) {
      items = items.filter(c => (c.canales || []).some(ch => canalesSelected.includes(ch)));
    }
    
    FILTERED = items.filter(c => {
      if (selected.includes('vencida') && c.vencida <= 0) return false;
      if (selected.includes('sobregiro') && !c.sobregirado) return false;
      if (selected.includes('protestado') && !c.protestado) return false;
      if (selected.includes('porvencer') && c.vencida > 0) return false;
      if (selected.includes('mixta') && !(c.vencida > 0 && c.porVencer > 0)) return false;
      return true;
    });
    
    recalcularYRenderizar();
    // También filtrar calendario si hay datos
    if (CAL_DATA) { aplicarFiltrosCalendario(); }
  }
  
  function aplicar() { cargar(); }
  
  function renderKPIs(kpis) {
    if (!kpis) return;
    const pctVenc = kpis.pctVencida || 0;
    const pctClass = pctVenc > 50 ? 'danger' : pctVenc > 25 ? 'warning' : 'success';
    
    document.getElementById('kpis-grid').innerHTML = `
      <div class="kpi-card"><div class="kpi-label">Deuda Total</div><div class="kpi-value">${formatMoney(kpis.deudaTotal)}</div><div class="kpi-sub">${kpis.clientes || 0} clientes • ${kpis.docs || 0} docs</div></div>
      <div class="kpi-card info"><div class="kpi-label">No Documentado</div><div class="kpi-value" style="color:var(--sap-orange)">${formatMoney(kpis.deudaNoDocumentada)}</div><div class="kpi-sub">Facturas pendientes</div></div>
      <div class="kpi-card success"><div class="kpi-label">Cheques Cartera</div><div class="kpi-value" style="color:var(--sap-green)">${formatMoney(kpis.chequesCartera)}</div><div class="kpi-sub">Documentado a fecha</div></div>
      <div class="kpi-card critical"><div class="kpi-label">Vencida</div><div class="kpi-value" style="color:var(--sap-red)">${formatMoney(kpis.vencida)}</div><div class="kpi-metric"><span class="kpi-pct ${pctClass}">${formatPct(pctVenc)} del total</span></div></div>
      <div class="kpi-card success"><div class="kpi-label">Por Vencer</div><div class="kpi-value" style="color:var(--sap-green)">${formatMoney(kpis.porVencer)}</div><div class="kpi-sub">Al día</div></div>
      <div class="kpi-card warning"><div class="kpi-label">Sobregiro</div><div class="kpi-value">${kpis.sobregirados || 0}</div><div class="kpi-sub">Clientes sobre línea</div></div>
    `;
  }
  
  function renderVendedores(items) {
    const container = document.getElementById('vendedores-grid');
    if (!items || !items.length) { container.innerHTML = ''; return; }
    
    const porCanal = {};
    items.forEach(c => {
      (c.canales || ['Sin Canal']).forEach(canal => {
        if (!porCanal[canal]) porCanal[canal] = { clientes: 0, deuda: 0, vencida: 0 };
        porCanal[canal].clientes++;
        porCanal[canal].deuda += c.totalDeuda || 0;
        porCanal[canal].vencida += c.vencida || 0;
      });
    });
    
    const canales = Object.entries(porCanal).sort((a, b) => b[1].deuda - a[1].deuda);
    const maxDeuda = Math.max(...canales.map(c => c[1].deuda));
    
    container.innerHTML = canales.map(([canal, stats]) => {
      const pctVenc = stats.deuda > 0 ? (stats.vencida / stats.deuda * 100) : 0;
      const barColor = pctVenc > 50 ? 'var(--sap-red)' : pctVenc > 25 ? 'var(--sap-orange)' : 'var(--sap-green)';
      const barWidth = maxDeuda > 0 ? (stats.deuda / maxDeuda * 100) : 0;
      return `<div class="vendedor-card" onclick="filtrarPorCanal('${canal}')"><div class="vendedor-name">${canal}</div><div class="vendedor-stats"><div class="vendedor-stat"><div class="vendedor-stat-value" style="color:var(--sap-blue)">${stats.clientes}</div><div class="vendedor-stat-label">Clientes</div></div><div class="vendedor-stat"><div class="vendedor-stat-value" style="color:var(--sap-red)">${formatPct(pctVenc)}</div><div class="vendedor-stat-label">% Vencida</div></div></div><div style="font-size:12px;font-weight:900;color:var(--sap-blue-dark);text-align:center;margin:4px 0">${formatMoney(stats.deuda)}</div><div class="vendedor-bar"><div class="vendedor-bar-fill" style="width:${barWidth}%;background:${barColor}"></div></div></div>`;
    }).join('');
  }
  
  function filtrarPorCanal(canal) {
    document.querySelectorAll('#canales-checkboxes input').forEach(cb => { cb.checked = (cb.value === canal); });
    filterByCanales();
    showToast(`Filtrado: ${canal}`);
  }
  
  function renderTabla() {
    const el = document.getElementById('list');
    if (!FILTERED || !FILTERED.length) { el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--sap-gray)">Sin resultados</div>'; return; }
    
    el.innerHTML = `<table class="sap-table"><thead><tr><th>Cliente</th><th>RUT</th><th class="center">Docs</th><th class="num">No Doc.</th><th class="num">Cheques</th><th class="num">Total</th><th class="num">Vencida</th><th class="center">Máx Días</th><th class="num">L. Crédito</th><th class="center">Util %</th><th class="center">Estado</th></tr></thead><tbody>${FILTERED.map(c => {
      const diasBadge = c.maxDias > 90 ? 'danger' : c.maxDias > 60 ? 'warning' : c.maxDias > 30 ? 'info' : 'success';
      const utilBadge = c.utilizacionPct > 100 ? 'danger' : c.utilizacionPct > 80 ? 'warning' : 'success';
      let estadoBadge = c.protestado ? '<span class="badge badge-danger">PROTEST</span>' : c.sobregirado ? '<span class="badge badge-warning">SOBREG</span>' : (c.vencida > 0 && c.porVencer > 0) ? '<span class="badge badge-info">MIXTA</span>' : c.vencida > 0 ? '<span class="badge badge-danger">VENCIDA</span>' : '<span class="badge badge-success">AL DÍA</span>';
      return `<tr onclick="verDetalle('${c.rut || c.cliente}')"><td><strong>${c.cliente || '-'}</strong></td><td>${c.rut || '-'}</td><td class="center">${c.docs || 0}</td><td class="num" style="color:var(--sap-orange)">${formatMoney(c.deudaNoDocumentada)}</td><td class="num" style="color:var(--sap-green)">${formatMoney(c.chequesCartera)}</td><td class="num"><strong>${formatMoney(c.totalDeuda)}</strong></td><td class="num" style="color:var(--sap-red)">${formatMoney(c.vencida)}</td><td class="center"><span class="badge badge-${diasBadge}">${c.maxDias}d</span></td><td class="num">${formatMoney(c.lineaCredito)}</td><td class="center"><span class="badge badge-${utilBadge}">${formatPct(c.utilizacionPct)}</span></td><td class="center">${estadoBadge}</td></tr>`;
    }).join('')}</tbody></table>`;
  }
  
  async function verDetalle(clienteOrRut) {
    document.getElementById('modal').classList.add('active');
    document.getElementById('m-body').innerHTML = '<div class="sap-loading"><div class="sap-spinner"></div><span>Cargando...</span></div>';
    try {
      const res = await run('apiDeudaGetDetalleCliente', clienteOrRut);
      if (!res.ok) throw new Error(res.error);
      CURRENT_CLIENTE_DETALLE = res;
      renderDetalleCliente(res);
    } catch (e) { document.getElementById('m-body').innerHTML = `<div style="color:var(--sap-red);padding:20px">Error: ${e.message}</div>`; }
  }
  
  function renderDetalleCliente(res) {
    document.getElementById('modal-title').textContent = 'Análisis de Deuda';
    const { cliente, rut, totales, credito, items, gestiones } = res;
    
    let html = `<div style="margin-bottom:16px"><h2 style="font-size:18px;font-weight:900;color:var(--sap-blue-dark);margin-bottom:4px">${cliente}</h2><p style="font-size:11px;color:var(--sap-gray)">RUT: ${rut || 'N/A'}</p><div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap">${res.gestion?.canales?.map(c => `<span class="badge badge-info">${c}</span>`).join('') || ''}${credito?.lineaCredito ? `<span class="badge badge-purple">CREDITO ${credito.lineaCredito > 0 ? Math.round(credito.lineaCredito/1000000) + 'M' : 'N/A'}</span>` : ''}</div></div>`;
    
    html += `<div class="modal-tabs"><button class="modal-tab active" onclick="switchModalTab('documentos')">📄 Documentos (${items?.length || 0})</button><button class="modal-tab" onclick="switchModalTab('gestion')">📋 Gestión (${gestiones?.length || 0})</button><button class="modal-tab" onclick="switchModalTab('resumen')">📊 Resumen</button></div>`;
    
    html += `<div id="tab-documentos" class="modal-tab-content active">`;
    if (items && items.length > 0) { items.forEach((it, idx) => { html += renderDocumentoCard(it, cliente, rut, idx); }); }
    else { html += '<p style="color:var(--sap-gray);padding:20px;text-align:center">Sin documentos</p>'; }
    html += `</div>`;
    
    html += `<div id="tab-gestion" class="modal-tab-content">`;
    if (gestiones && gestiones.length > 0) { html += `<div class="gestion-timeline">`; gestiones.forEach(g => { html += renderTimelineItem(g); }); html += `</div>`; }
    else { html += '<p style="color:var(--sap-gray);padding:20px;text-align:center">Sin gestiones</p>'; }
    html += `</div>`;
    
    html += `<div id="tab-resumen" class="modal-tab-content"><div class="kpis-grid" style="grid-template-columns:repeat(4,1fr)"><div class="kpi-card"><div class="kpi-label">No Documentado</div><div class="kpi-value" style="color:var(--sap-orange)">${formatMoney(totales?.deudaNoDocumentada)}</div></div><div class="kpi-card success"><div class="kpi-label">Cheques</div><div class="kpi-value" style="color:var(--sap-green)">${formatMoney(totales?.chequesCartera)}</div></div><div class="kpi-card"><div class="kpi-label">Total</div><div class="kpi-value">${formatMoney(totales?.deudaTotal)}</div></div><div class="kpi-card critical"><div class="kpi-label">Vencida</div><div class="kpi-value" style="color:var(--sap-red)">${formatMoney(totales?.vencida)}</div></div></div><div style="margin-top:16px;padding:12px;background:#fff;border:1px solid var(--sap-border);border-radius:4px"><h4 style="font-size:11px;font-weight:700;margin-bottom:8px">📊 Línea de Crédito</h4><div style="display:flex;gap:20px;flex-wrap:wrap"><div><span style="color:var(--sap-gray);font-size:10px">Aprobado:</span> <strong>${formatMoney(credito?.lineaCredito)}</strong></div><div><span style="color:var(--sap-gray);font-size:10px">Utilizado:</span> <strong>${formatMoney(totales?.deudaTotal)}</strong></div><div><span style="color:var(--sap-gray);font-size:10px">Disponible:</span> <strong style="color:${credito?.disponible < 0 ? 'var(--sap-red)' : 'var(--sap-green)'}">${formatMoney(credito?.disponible)}</strong></div></div></div></div>`;
    
    document.getElementById('m-body').innerHTML = html;
  }
  
  function renderDocumentoCard(it, cliente, rut, idx) {
    const formId = `form-${idx}`;
    const diasSigned = it.diasSigned != null ? it.diasSigned : it.diasVenc;
    let estadoBadge = diasSigned > 90 ? '<span class="badge badge-danger">+90D VENCIDA</span>' : diasSigned > 60 ? '<span class="badge badge-danger">61-90D</span>' : diasSigned > 30 ? '<span class="badge badge-warning">31-60D</span>' : diasSigned > 0 ? '<span class="badge badge-warning">1-30D VENCIDA</span>' : '<span class="badge badge-success">POR VENCER</span>';
    const noDoc = it.deuda || 0, cheques = it.chequesCartera || 0, total = noDoc + cheques;
    const gestionIndicator = it.tieneGestion ? '📋' : '➕';
    
    let html = `<div class="gestion-doc-card"><div class="gestion-doc-header"><div class="gestion-doc-info"><span class="gestion-doc-num">${gestionIndicator} ${it.documento || 'S/N'}</span><span class="gestion-doc-meta">F. Fact: ${it.fechaFactura || '-'} • Venc: ${it.fechaVenc || '-'}</span></div><div class="gestion-doc-estado">${estadoBadge} <span style="font-size:10px;color:var(--sap-gray)">${Math.abs(diasSigned)}d</span></div><div class="gestion-doc-montos">`;
    if (noDoc > 0) html += `<div class="gestion-doc-monto-item no-doc"><div class="gestion-doc-monto-label">No Documentado</div><div class="gestion-doc-monto-value no-doc">${formatMoney(noDoc)}</div></div>`;
    if (cheques > 0) html += `<div class="gestion-doc-monto-item cheques"><div class="gestion-doc-monto-label">Cheque</div><div class="gestion-doc-monto-value cheques">${formatMoney(cheques)}</div></div>`;
    if (noDoc > 0 && cheques > 0) html += `<div class="gestion-doc-monto-item total"><div class="gestion-doc-monto-label">Total</div><div class="gestion-doc-monto-value total">${formatMoney(total)}</div></div>`;
    else if (noDoc === 0 && cheques > 0) html += `<div class="gestion-doc-monto-item total"><div class="gestion-doc-monto-label">Total</div><div class="gestion-doc-monto-value total">${formatMoney(cheques)}</div></div>`;
    else if (noDoc === 0 && cheques === 0) html += `<div class="gestion-doc-monto-item"><div class="gestion-doc-monto-value" style="color:var(--sap-gray)">$0</div></div>`;
    
    html += `</div></div><div class="gestion-doc-body"><div class="gestion-doc-actions"><button class="btn-gestion btn-gestion-nc" onclick="toggleGestionForm('${formId}', 'nota_credito')">📄 Nota Crédito</button><button class="btn-gestion btn-gestion-precio" onclick="toggleGestionForm('${formId}', 'diferencia_precio')">💲 Dif. Precio</button><button class="btn-gestion btn-gestion-acuerdo" onclick="toggleGestionForm('${formId}', 'acuerdo_comercial')">🤝 Acuerdo</button><button class="btn-gestion btn-gestion-compromiso" onclick="toggleGestionForm('${formId}', 'compromiso_pago')">💰 Compromiso</button></div>`;
    
    html += `<div id="${formId}" class="gestion-form-inline" data-rut="${rut}" data-cliente="${cliente}" data-doc="${it.documento}"><div class="gestion-form-row"><div class="gestion-form-group"><label class="gestion-form-label">Tipo</label><select class="gestion-form-select" id="${formId}-tipo" onchange="checkCompromisoFields('${formId}')"><option value="nota_credito">📄 Nota de Crédito</option><option value="diferencia_precio">💲 Diferencia de Precio</option><option value="acuerdo_comercial">🤝 Acuerdo Comercial</option><option value="compromiso_pago">💰 Compromiso de Pago</option></select></div><div class="gestion-form-group" id="${formId}-fecha-group" style="display:none"><label class="gestion-form-label">Fecha Compromiso</label><input type="date" class="gestion-form-input" id="${formId}-fecha"></div></div><div class="gestion-form-row" id="${formId}-monto-row" style="display:none"><div class="gestion-form-group"><label class="gestion-form-label">Monto</label><input type="number" class="gestion-form-input" id="${formId}-monto" placeholder="0"></div></div><div class="gestion-form-group full"><label class="gestion-form-label">Descripción *</label><textarea class="gestion-form-textarea" id="${formId}-desc" placeholder="Detalle..."></textarea></div><div class="gestion-form-actions"><button class="btn btn-secondary" onclick="toggleGestionForm('${formId}')">Cancelar</button><button class="btn btn-primary" onclick="guardarGestion('${formId}')">💾 Guardar</button></div></div>`;
    
    if (it.gestiones && it.gestiones.length > 0) { html += `<div class="gestion-timeline" style="margin-top:12px">`; it.gestiones.forEach(g => { html += renderTimelineItem(g); }); html += `</div>`; }
    html += `</div></div>`;
    return html;
  }
  
  function renderTimelineItem(g) {
    const tipo = TIPOS_GESTION[g.tipo] || { icon: '📝', label: g.tipo, badge: 'badge-info' };
    const estadoBadgeClass = { 'abierto': 'badge-warning', 'cumplido': 'badge-success', 'incumplido': 'badge-danger' };
    const fecha = g.timestamp ? new Date(g.timestamp).toLocaleDateString('es-CL') : '-';
    const esCumplido = g.estado === 'cumplido', esIncumplido = g.estado === 'incumplido', puedeAccionar = !esCumplido && !esIncumplido;
    
    return `<div class="gestion-timeline-item tipo-${g.tipo} estado-${g.estado}"><div class="gestion-timeline-header"><span class="gestion-timeline-fecha">${fecha}</span><span class="gestion-timeline-vendedor">${g.canalVendedor || 'Sistema'}</span>${g.documento ? `<span style="font-size:9px;color:var(--sap-blue)">Doc: ${g.documento}</span>` : ''}</div><div class="gestion-timeline-desc">${tipo.icon} ${g.descripcion || 'Sin descripción'}</div><div class="gestion-timeline-badges"><span class="badge ${tipo.badge}">${tipo.label}</span><span class="badge ${estadoBadgeClass[g.estado] || 'badge-warning'}">${g.estado?.toUpperCase() || 'ABIERTO'}</span>${g.fechaCompromiso ? `<span class="badge badge-purple">📅 ${g.fechaCompromiso}</span>` : ''}${g.montoCompromiso ? `<span class="badge badge-info">💵 ${formatMoney(g.montoCompromiso)}</span>` : ''}</div><div class="gestion-timeline-actions">${puedeAccionar ? `<button class="btn-mini btn-mini-success" onclick="actualizarEstadoGestion(${g.id}, 'cumplido')">✓ Cumplido</button><button class="btn-mini btn-mini-danger" onclick="actualizarEstadoGestion(${g.id}, 'incumplido')">✗ Incumplido</button>` : ''}${esCumplido ? `<button class="btn-mini btn-mini-danger" onclick="eliminarGestion(${g.id})">🗑️ Eliminar</button>` : ''}</div></div>`;
  }
  
  function switchModalTab(tab) {
    document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.modal-tab-content').forEach(c => c.classList.remove('active'));
    document.querySelector(`.modal-tab[onclick*="${tab}"]`)?.classList.add('active');
    document.getElementById(`tab-${tab}`)?.classList.add('active');
  }
  
  function toggleGestionForm(formId, tipo = null) {
    const form = document.getElementById(formId);
    if (!form) return;
    document.querySelectorAll('.gestion-form-inline.active').forEach(f => { if (f.id !== formId) f.classList.remove('active'); });
    form.classList.toggle('active');
    if (tipo && form.classList.contains('active')) { const tipoSelect = document.getElementById(`${formId}-tipo`); if (tipoSelect) { tipoSelect.value = tipo; checkCompromisoFields(formId); } }
  }
  
  function checkCompromisoFields(formId) {
    const tipo = document.getElementById(`${formId}-tipo`)?.value;
    const fechaGroup = document.getElementById(`${formId}-fecha-group`);
    const montoRow = document.getElementById(`${formId}-monto-row`);
    const show = tipo === 'compromiso_pago';
    if (fechaGroup) fechaGroup.style.display = show ? 'block' : 'none';
    if (montoRow) montoRow.style.display = show ? 'block' : 'none';
  }
  
  async function guardarGestion(formId) {
    const form = document.getElementById(formId);
    if (!form) return;
    const rut = form.dataset.rut, cliente = form.dataset.cliente, documento = form.dataset.doc;
    const tipo = document.getElementById(`${formId}-tipo`)?.value || 'nota_credito';
    const descripcion = document.getElementById(`${formId}-desc`)?.value?.trim();
    const fechaCompromiso = document.getElementById(`${formId}-fecha`)?.value || '';
    const montoCompromiso = Number(document.getElementById(`${formId}-monto`)?.value) || 0;
    if (!descripcion) { showToast('Ingrese descripción', 'error'); return; }
    try {
      const res = await run('apiGestionAgregarSeguimiento', { rut, cliente, documento, tipo, descripcion, fechaCompromiso, montoCompromiso, estado: 'abierto' });
      if (!res.ok) throw new Error(res.error);
      showToast('Gestión guardada ✓', 'success');
      verDetalle(rut || cliente);
    } catch (e) { showToast('Error: ' + e.message, 'error'); }
  }
  
  async function actualizarEstadoGestion(id, nuevoEstado) {
    if (!confirm(`¿Marcar como ${nuevoEstado.toUpperCase()}?`)) return;
    try {
      const res = await run('apiGestionActualizarEstado', { id, nuevoEstado });
      if (!res.ok) throw new Error(res.error);
      showToast(`Estado: ${nuevoEstado}`, 'success');
      if (CURRENT_CLIENTE_DETALLE) verDetalle(CURRENT_CLIENTE_DETALLE.rut || CURRENT_CLIENTE_DETALLE.cliente);
    } catch (e) { showToast('Error: ' + e.message, 'error'); }
  }
  
  async function eliminarGestion(id) {
    if (!confirm('¿Eliminar gestión cumplida?')) return;
    try {
      const res = await run('apiGestionEliminar', id);
      if (!res.ok) throw new Error(res.error);
      showToast('Eliminada', 'success');
      if (CURRENT_CLIENTE_DETALLE) verDetalle(CURRENT_CLIENTE_DETALLE.rut || CURRENT_CLIENTE_DETALLE.cliente);
    } catch (e) { showToast('Error: ' + e.message, 'error'); }
  }
  
  function closeModal() { document.getElementById('modal').classList.remove('active'); CURRENT_CLIENTE_DETALLE = null; }
  
  async function cargarCalendario() {
    document.getElementById('loadingCalendario').style.display = 'flex';
    document.getElementById('wrapperCalendario').style.display = 'none';
    try {
      const opts = { desde: document.getElementById('cal-desde')?.value || '', hasta: document.getElementById('cal-hasta')?.value || '', estado: document.getElementById('cal-estado')?.value || 'todos', q: document.getElementById('cal-q')?.value || '' };
      const res = await run('apiCobranzaGetCalendarioConFiltroVendedor', opts);
      if (!res.ok) throw new Error(res.error);
      CAL_DATA = res;
      CAL_FILTERED = res.items || [];
      // Aplicar filtros del sidebar (canales y filtros rápidos)
      aplicarFiltrosCalendario();
    } catch (e) { showToast('Error: ' + e.message, 'error'); }
    finally { document.getElementById('loadingCalendario').style.display = 'none'; document.getElementById('wrapperCalendario').style.display = 'block'; }
  }
  
  function recalcularCalendario() {
    const kpis = calcularCalKPIs(CAL_FILTERED);
    renderCalendarioKPIs(kpis);
    renderCalendarioTabla(CAL_FILTERED);
  }
  
  function aplicarFiltrosCalendario() {
    if (!CAL_DATA) return;
    
    // Aplicar todos los filtros: propios del calendario + sidebar
    let items = CAL_DATA?.items || [];
    
    // Filtros propios del calendario
    const desde = document.getElementById('cal-desde')?.value;
    const hasta = document.getElementById('cal-hasta')?.value;
    const estado = document.getElementById('cal-estado')?.value || 'todos';
    const q = document.getElementById('cal-q')?.value?.toLowerCase() || '';
    
    if (desde) items = items.filter(it => it.fechaVenc >= desde);
    if (hasta) items = items.filter(it => it.fechaVenc <= hasta);
    if (estado === 'vencida') items = items.filter(it => it.diasSigned > 0);
    if (estado === 'porvencer') items = items.filter(it => it.diasSigned <= 0);
    if (q) items = items.filter(it => (it.cliente?.toLowerCase().includes(q) || it.rut?.toLowerCase().includes(q) || it.documento?.toLowerCase().includes(q)));
    
    // Filtros del sidebar - Canales
    const canalChecks = document.querySelectorAll('#canales-checkboxes input:checked');
    const canalesSelected = Array.from(canalChecks).map(c => c.value);
    if (canalesSelected.length > 0 && canalesSelected.length < ALL_CANALES.length) {
      items = items.filter(it => canalesSelected.includes(it.canalVenta));
    }
    
    // Filtros del sidebar - Filtros rápidos
    const quickChecks = document.querySelectorAll('.sap-nav-section .filter-checkbox input:checked');
    const quickSelected = Array.from(quickChecks).map(c => c.value);
    if (quickSelected.length > 0) {
      items = items.filter(it => {
        const vencido = it.diasSigned > 0;
        if (quickSelected.includes('vencida') && !vencido) return false;
        if (quickSelected.includes('porvencer') && vencido) return false;
        return true;
      });
    }
    
    CAL_FILTERED = items;
    recalcularCalendario();
  }
  
  function calcularCalKPIs(items) {
    const totalNoDoc = items.reduce((s, it) => s + (it.deuda || 0), 0);
    const totalCheques = items.reduce((s, it) => s + (it.chequesCartera || 0), 0);
    const totalVencida = items.reduce((s, it) => (it.diasSigned > 0 ? s + (it.deuda || 0) : s), 0);
    const criticos = items.filter(it => it.diasSigned > 60);
    return { totalFacturas: items.length, totalNoDocumentado: totalNoDoc, totalCheques: totalCheques, totalDeuda: totalNoDoc + totalCheques, totalVencida: totalVencida, totalPorVencer: totalNoDoc - totalVencida, casosCriticos: criticos.length };
  }
  
  function aplicarCalendario() { 
    if (CAL_DATA) {
      aplicarFiltrosCalendario();
    } else {
      cargarCalendario(); 
    }
  }
  
  function limpiarFiltrosCalendario() { 
    document.getElementById('cal-desde').value = ''; 
    document.getElementById('cal-hasta').value = ''; 
    document.getElementById('cal-estado').value = 'todos'; 
    document.getElementById('cal-q').value = ''; 
    if (CAL_DATA) {
      aplicarFiltrosCalendario();
    } else {
      cargarCalendario(); 
    }
  }
  
  function renderCalendarioKPIs(kpis) {
    document.getElementById('cal-kpis-grid').innerHTML = `<div class="kpi-card"><div class="kpi-label">Total Facturas</div><div class="kpi-value">${kpis.totalFacturas || 0}</div></div><div class="kpi-card info"><div class="kpi-label">No Documentado</div><div class="kpi-value" style="color:var(--sap-orange)">${formatMoney(kpis.totalNoDocumentado)}</div></div><div class="kpi-card success"><div class="kpi-label">Cheques</div><div class="kpi-value" style="color:var(--sap-green)">${formatMoney(kpis.totalCheques)}</div></div><div class="kpi-card critical"><div class="kpi-label">Vencida</div><div class="kpi-value" style="color:var(--sap-red)">${formatMoney(kpis.totalVencida)}</div></div><div class="kpi-card success"><div class="kpi-label">Por Vencer</div><div class="kpi-value" style="color:var(--sap-green)">${formatMoney(kpis.totalPorVencer)}</div></div><div class="kpi-card warning"><div class="kpi-label">Críticos +60d</div><div class="kpi-value">${kpis.casosCriticos || 0}</div></div>`;
  }
  
  function renderCalendarioTabla(items) {
    const el = document.getElementById('cal-tabla');
    if (!items || !items.length) { el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--sap-gray)">Sin facturas</div>'; return; }
    el.innerHTML = `<table class="sap-table"><thead><tr><th>Cliente</th><th>RUT</th><th>Doc</th><th>F. Venc</th><th class="center">Días</th><th class="num">No Doc</th><th class="num">Cheque</th><th class="num">Total</th><th>Canal</th></tr></thead><tbody>${items.map(it => {
      const vencido = it.diasSigned > 0, noDoc = it.deuda || 0, cheques = it.chequesCartera || 0;
      return `<tr onclick="verDetalle('${it.rut || it.cliente}')" style="${vencido ? 'background:#FEF2F2' : ''}"><td><strong>${it.cliente}</strong></td><td>${it.rut || '-'}</td><td>${it.documento || '-'}</td><td>${it.fechaVenc || '-'}</td><td class="center"><span class="badge badge-${vencido ? 'danger' : 'success'}">${it.diasVenc}d</span></td><td class="num" style="color:var(--sap-orange)">${formatMoney(noDoc)}</td><td class="num" style="color:var(--sap-green)">${formatMoney(cheques)}</td><td class="num"><strong>${formatMoney(noDoc + cheques)}</strong></td><td>${it.canalVenta || '-'}</td></tr>`;
    }).join('')}</tbody></table>`;
  }
  
  async function cargarSeguimiento() {
    document.getElementById('loadingSeguimiento').style.display = 'flex';
    document.getElementById('wrapperSeguimiento').style.display = 'none';
    try {
      const filtros = { q: document.getElementById('seg-q')?.value || '', tipo: document.getElementById('seg-tipo')?.value || 'todos', estado: document.getElementById('seg-estado')?.value || 'todos' };
      const res = await run('apiGestionGetResumen', filtros);
      if (!res.ok) throw new Error(res.error);
      SEG_DATA = res;
      renderSeguimientoKPIs(res.stats);
      renderSeguimientoTabla(res.clientesResumen);
    } catch (e) { showToast('Error: ' + e.message, 'error'); }
    finally { document.getElementById('loadingSeguimiento').style.display = 'none'; document.getElementById('wrapperSeguimiento').style.display = 'block'; }
  }
  
  function limpiarFiltrosSeguimiento() { document.getElementById('seg-q').value = ''; document.getElementById('seg-tipo').value = 'todos'; document.getElementById('seg-estado').value = 'todos'; cargarSeguimiento(); }
  
  function renderSeguimientoKPIs(stats) {
    if (!stats) return;
    document.getElementById('seg-kpis-grid').innerHTML = `<div class="kpi-card"><div class="kpi-label">Total Gestiones</div><div class="kpi-value">${stats.total || 0}</div><div class="kpi-sub">${stats.clientesUnicos || 0} clientes</div></div><div class="kpi-card info"><div class="kpi-label">Notas Crédito</div><div class="kpi-value" style="color:#6366f1">${stats.notasCredito || 0}</div></div><div class="kpi-card warning"><div class="kpi-label">Dif. Precio</div><div class="kpi-value" style="color:#f59e0b">${stats.diferenciaPrecio || 0}</div></div><div class="kpi-card success"><div class="kpi-label">Acuerdos</div><div class="kpi-value" style="color:#10b981">${stats.acuerdosComercial || 0}</div></div><div class="kpi-card info"><div class="kpi-label">Compromisos</div><div class="kpi-value" style="color:var(--purple)">${stats.compromisosPago || 0}</div><div class="kpi-sub">${formatMoney(stats.montoCompromisos)}</div></div><div class="kpi-card"><div class="kpi-label">Abiertos</div><div class="kpi-value">${stats.abiertos || 0}</div></div>`;
  }
  
  function renderSeguimientoTabla(clientes) {
    const el = document.getElementById('seg-tabla');
    if (!clientes || !clientes.length) { el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--sap-gray)">Sin gestiones registradas</div>'; return; }
    
    let html = `<div class="seg-table-container"><div class="seg-row seg-row-header"><div class="seg-cell">Cliente</div><div class="seg-cell">Última Gestión</div><div class="seg-cell">Estadísticas</div><div class="seg-cell">Acciones</div></div>`;
    
    clientes.forEach(c => {
      const ultima = c.ultimaGestion;
      const tipoInfo = ultima ? (TIPOS_GESTION[ultima.tipo] || { icon: '📝', label: ultima.tipo, badge: 'badge-info' }) : null;
      const estadoBadge = ultima ? (ultima.estado === 'cumplido' ? 'badge-success' : ultima.estado === 'incumplido' ? 'badge-danger' : 'badge-warning') : '';
      
      html += `<div class="seg-row"><div class="seg-cell seg-cliente-info"><span class="seg-cliente-name" onclick="verDetalle('${c.rut || c.cliente}')">${c.cliente}</span><span class="seg-cliente-meta">RUT: ${c.rut || 'N/A'} • ${c.totalGestiones} gestiones</span></div><div class="seg-cell seg-gestion-preview">${ultima ? `<div class="seg-gestion-text">${tipoInfo.icon} ${ultima.descripcion?.substring(0, 50) || '-'}${ultima.descripcion?.length > 50 ? '...' : ''}</div><div class="seg-gestion-badges"><span class="badge ${tipoInfo.badge}">${tipoInfo.label}</span><span class="badge ${estadoBadge}">${ultima.estado?.toUpperCase()}</span><span style="font-size:9px;color:var(--sap-gray)">Doc: ${ultima.documento || 'N/A'}</span></div>` : '<span style="color:var(--sap-gray)">-</span>'}</div><div class="seg-cell seg-stats"><div class="seg-stat-item"><div class="seg-stat-value" style="color:var(--sap-blue)">${c.totalGestiones}</div><div class="seg-stat-label">Total</div></div><div class="seg-stat-item"><div class="seg-stat-value" style="color:var(--purple)">${c.compromisosPendientes || 0}</div><div class="seg-stat-label">Pend.</div></div></div><div class="seg-cell seg-actions"><button class="btn btn-primary" style="font-size:9px;padding:4px 8px" onclick="verDetalle('${c.rut || c.cliente}')">Ver</button>${ultima && ultima.estado === 'abierto' ? `<button class="btn-mini btn-mini-success" onclick="event.stopPropagation();actualizarEstadoGestionSeg(${ultima.id}, 'cumplido')">✓</button><button class="btn-mini btn-mini-danger" onclick="event.stopPropagation();actualizarEstadoGestionSeg(${ultima.id}, 'incumplido')">✗</button>` : ''}${ultima && ultima.estado === 'cumplido' ? `<button class="btn-mini btn-mini-danger" onclick="event.stopPropagation();eliminarGestionSeg(${ultima.id})">🗑️</button>` : ''}</div></div>`;
    });
    
    html += '</div>';
    el.innerHTML = html;
  }
  
  async function actualizarEstadoGestionSeg(id, nuevoEstado) {
    try { const res = await run('apiGestionActualizarEstado', { id, nuevoEstado }); if (!res.ok) throw new Error(res.error); showToast(`Estado: ${nuevoEstado}`, 'success'); cargarSeguimiento(); } catch (e) { showToast('Error: ' + e.message, 'error'); }
  }
  
  async function eliminarGestionSeg(id) {
    if (!confirm('¿Eliminar gestión cumplida?')) return;
    try { const res = await run('apiGestionEliminar', id); if (!res.ok) throw new Error(res.error); showToast('Eliminada', 'success'); cargarSeguimiento(); } catch (e) { showToast('Error: ' + e.message, 'error'); }
  }
  
  function exportar() {
    if (!FILTERED?.length) { showToast('Sin datos', 'error'); return; }
    const data = FILTERED.map(c => ({ 'Cliente': c.cliente, 'RUT': c.rut, 'Docs': c.docs, 'No Documentado': c.deudaNoDocumentada, 'Cheques': c.chequesCartera, 'Total': c.totalDeuda, 'Vencida': c.vencida, 'Máx Días': c.maxDias, 'L. Crédito': c.lineaCredito, 'Util %': c.utilizacionPct }));
    const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Deuda'); XLSX.writeFile(wb, `Deuda_VDA_${new Date().toISOString().slice(0,10)}.xlsx`); showToast('Excel descargado');
  }
  
  function exportarCalendario() {
    if (!CAL_FILTERED?.length) { showToast('Sin datos', 'error'); return; }
    const data = CAL_FILTERED.map(it => ({ 'Cliente': it.cliente, 'RUT': it.rut, 'Doc': it.documento, 'F. Venc': it.fechaVenc, 'Días': it.diasVenc, 'No Doc': it.deuda, 'Cheque': it.chequesCartera, 'Total': (it.deuda || 0) + (it.chequesCartera || 0), 'Canal': it.canalVenta }));
    const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Calendario'); XLSX.writeFile(wb, `Calendario_${new Date().toISOString().slice(0,10)}.xlsx`); showToast('Excel descargado');
  }
  
  function exportarCalendarioPDF() {
    if (!CAL_FILTERED?.length) { showToast('Sin datos', 'error'); return; }
    const { jsPDF } = window.jspdf; const doc = new jsPDF('l', 'mm', 'a4'); doc.setFontSize(16); doc.text('Calendario de Cobranza - VDA', 14, 15); doc.setFontSize(10); doc.text(`Generado: ${new Date().toLocaleString('es-CL')}`, 14, 22);
    const tableData = CAL_FILTERED.map(it => [it.cliente?.substring(0, 25), it.rut || '-', it.documento || '-', it.fechaVenc || '-', it.diasVenc + 'd', formatMoney(it.deuda), formatMoney(it.chequesCartera), formatMoney((it.deuda || 0) + (it.chequesCartera || 0))]);
    doc.autoTable({ head: [['Cliente', 'RUT', 'Doc', 'Venc', 'Días', 'No Doc', 'Cheque', 'Total']], body: tableData, startY: 28, styles: { fontSize: 8 }, headStyles: { fillColor: [8, 84, 160] } });
    doc.save(`Calendario_${new Date().toISOString().slice(0,10)}.pdf`); showToast('PDF descargado');
  }
  
  function showToast(msg, type = 'info') {
    const existing = document.querySelector('.toast-notification'); if (existing) existing.remove();
    const toast = document.createElement('div'); toast.className = `toast-notification ${type}`; toast.innerHTML = `<span>${type === 'success' ? '✓' : type === 'error' ? '✗' : 'ℹ'}</span><span>${msg}</span>`; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000);
  }
  
  document.addEventListener('DOMContentLoaded', () => { cargar(); });
</script>
