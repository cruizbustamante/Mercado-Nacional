<style>
    :root {
      --sap-blue: #0854A0;
      --sap-blue-dark: #053B6B;
      --sap-green: #107E3E;
      --sap-red: #BB0000;
      --sap-orange: #E65100;
      --sap-purple: #8B4789;
      --sap-gray: #6A6D70;
      --sap-border: #D9D9D9;
      --sap-bg: #F7F7F7;
      --shadow-sm: 0 2px 6px rgba(20,20,30,.06);
      --shadow: 0 4px 12px rgba(20,20,30,.08);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font: 11px/1.4 "Segoe UI", Arial, sans-serif;
      background: var(--sap-bg);
      color: #32363A;
      height: 100vh;
      overflow: hidden;
    }
    
    .sap-shell {
      display: grid;
      grid-template-columns: 200px 1fr;
      height: 100vh;
    }
    
    .sap-sidebar {
      background: linear-gradient(180deg, var(--sap-blue-dark) 0%, #02243D 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
    }
    
    .sap-logo {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,.15);
    }
    
    .sap-logo-title { font-size: 14px; font-weight: 700; }
    .sap-logo-sub { font-size: 9px; opacity: .8; margin-top: 4px; }
    
    .fecha-badge {
      background: rgba(255,255,255,0.2);
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 8px;
      margin-top: 8px;
      display: inline-block;
    }
    
    .fecha-informe {
      background: linear-gradient(135deg, #ff6b35, #f7931e);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 700;
      margin-top: 10px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(255,107,53,0.4);
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
    
    .sap-nav { padding: 10px 0; flex: 1; }
    
    .sap-nav-item {
      padding: 12px 16px;
      color: rgba(255,255,255,.85);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border-left: 3px solid transparent;
    }
    
    .sap-nav-item:hover { background: rgba(255,255,255,.08); }
    .sap-nav-item.active { background: rgba(255,255,255,.12); border-left-color: #0A6ED1; }
    
    .sap-nav-back { border-top: 1px solid rgba(255,255,255,.15); margin-top: auto; }
    
    .sap-main {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    
    .sap-header {
      background: #fff;
      border-bottom: 2px solid var(--sap-border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .sap-title { font-size: 18px; font-weight: 700; color: var(--sap-blue); }
    .sap-breadcrumb { font-size: 10px; color: var(--sap-gray); margin-bottom: 2px; }
    
    .header-actions { display: flex; gap: 12px; align-items: center; }
    
    .filter-badge {
      display: none;
      align-items: center;
      gap: 8px;
      background: var(--sap-blue);
      color: #fff;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
    }
    
    .filter-badge.show { display: flex; }
    
    .filter-badge button {
      background: rgba(255,255,255,.3);
      border: none;
      color: #fff;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 11px;
    }
    
    .year-select {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      padding: 8px 14px;
      border: 2px solid var(--sap-border);
      border-radius: 6px;
    }
    
    .year-select label { font-size: 10px; font-weight: 700; color: var(--sap-gray); }
    .year-select select { border: none; font-size: 13px; font-weight: 700; color: var(--sap-blue); cursor: pointer; }
    
    .btn-refresh {
      background: var(--sap-blue);
      border: none;
      color: #fff;
      width: 40px;
      height: 40px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    
    .btn-refresh.loading { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .btn-pdf {
      background: linear-gradient(135deg, #107E3E, #0a5c2c);
      border: none;
      color: #fff;
      height: 40px;
      padding: 0 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .btn-pdf:hover { background: linear-gradient(135deg, #0a5c2c, #084020); transform: scale(1.02); }
    .btn-pdf:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-pdf.loading { animation: pulse 1s ease-in-out infinite; }
    
    .sap-content { flex: 1; overflow-y: auto; padding: 20px 24px; }
    
    /* Cards */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .kpi-card {
      background: #fff;
      border-radius: 8px;
      padding: 16px;
      box-shadow: var(--shadow-sm);
      border-top: 4px solid var(--sap-blue);
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .kpi-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
    .kpi-card.active { box-shadow: 0 0 0 3px rgba(8, 84, 160, 0.3); }
    .kpi-card.clickable { cursor: pointer; transition: all 0.2s; }
    .kpi-card.clickable:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.15); }
    tr.highlighted { background: rgba(10, 110, 209, 0.15) !important; font-weight: 600; }
    
    /* Variaciones M/A/Y */
    .kpi-variations {
      display: flex;
      justify-content: space-between;
      gap: 4px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #eee;
      font-size: 9px;
      font-weight: 600;
    }
    .kpi-variations span {
      padding: 2px 4px;
      border-radius: 3px;
    }
    .var-up { color: #107e3e; background: rgba(16,126,62,0.1); }
    .var-down { color: #bb0000; background: rgba(187,0,0,0.1); }
    .kpi-card.green { border-top-color: var(--sap-green); }
    .kpi-card.orange { border-top-color: var(--sap-orange); }
    .kpi-card.purple { border-top-color: var(--sap-purple); }
    .kpi-card.red { border-top-color: var(--sap-red); }
    .kpi-card.no-click { cursor: default; }
    
    .kpi-icon-title { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .kpi-icon { font-size: 20px; }
    .kpi-title { font-size: 10px; font-weight: 700; color: var(--sap-gray); text-transform: uppercase; letter-spacing: 0.5px; }
    .kpi-value { font-size: 24px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
    .kpi-subtitle { font-size: 9px; color: var(--sap-gray); margin-bottom: 12px; }
    
    .kpi-row { display: flex; justify-content: space-between; padding: 6px 0; border-top: 1px solid #f0f0f0; }
    .kpi-row:first-of-type { border-top: none; }
    .kpi-label { font-size: 9px; color: var(--sap-gray); font-weight: 600; }
    .kpi-data { font-size: 11px; font-weight: 700; color: #1a1a1a; }
    .kpi-data.green { color: var(--sap-green); }
    .kpi-data.red { color: var(--sap-red); }
    
    .kpi-trend {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 9px;
      font-weight: 700;
      margin-top: 8px;
    }
    
    .kpi-trend.up { background: #e8f5e9; color: var(--sap-green); }
    .kpi-trend.down { background: #ffebee; color: var(--sap-red); }
    
    /* Section */
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 24px 0 16px 0;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--sap-border);
    }
    
    .section-icon { font-size: 20px; }
    .section-title { font-size: 13px; font-weight: 700; color: var(--sap-blue); text-transform: uppercase; }
    
    /* Charts */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .chart-card {
      background: #fff;
      border-radius: 8px;
      padding: 16px;
      box-shadow: var(--shadow-sm);
    }
    
    .chart-title {
      font-size: 11px;
      font-weight: 700;
      color: #333;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .chart-wrapper { height: 200px; }
    
    /* Tables */
    .tables-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    
    .table-card {
      background: #fff;
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    
    .table-header {
      background: #fafbfc;
      padding: 12px 16px;
      border-bottom: 2px solid #e8e8e8;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .table-title { font-size: 12px; font-weight: 700; color: #333; display: flex; align-items: center; gap: 8px; flex: 1; }
    .table-wrapper { max-height: 320px; overflow-y: auto; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table thead { background: #f5f6f7; position: sticky; top: 0; }
    .data-table th { padding: 10px 12px; font-size: 9px; font-weight: 700; color: #555; text-transform: uppercase; text-align: center; border-bottom: 2px solid #e0e0e0; }
    .data-table th:first-child { text-align: left; }
    .data-table td { padding: 10px 12px; font-size: 11px; text-align: center; border-bottom: 1px solid #f0f0f0; }
    .data-table td:first-child { text-align: left; font-weight: 600; }
    .data-table tbody tr:hover { background: #f8fafc; }
    .data-table tfoot { background: #f0f4f8; position: sticky; bottom: 0; }
    .data-table tfoot td { font-weight: 700; border-top: 2px solid var(--sap-blue); color: var(--sap-blue); }
    
    .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 9px; font-weight: 700; }
    .badge-success { background: #e8f5e9; color: var(--sap-green); }
    .badge-warning { background: #fff3e0; color: var(--sap-orange); }
    .badge-danger { background: #ffebee; color: var(--sap-red); }
    
    /* Loading */
    .loading-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e0e0e0; border-top-color: var(--sap-blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
    
    /* Toast */
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--sap-blue); color: #fff; padding: 14px 24px; border-radius: 8px; font-size: 11px; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,.25); display: none; z-index: 9999; }
    .toast.active { display: block; }
    .toast.success { background: var(--sap-green); }
    .toast.error { background: var(--sap-red); }
    
    /* Modal Fullscreen para tablas */
    .table-fullscreen-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.85);
      z-index: 10000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .table-fullscreen-overlay.active {
      display: flex;
    }
    
    .table-fullscreen-content {
      background: #fff;
      border-radius: 12px;
      width: 95%;
      max-width: 1400px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    
    .table-fullscreen-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 2px solid var(--sap-border);
      background: #fafbfc;
      border-radius: 12px 12px 0 0;
    }
    
    .table-fullscreen-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--sap-blue);
    }
    
    .btn-close-fullscreen {
      background: var(--sap-red);
      border: none;
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-close-fullscreen:hover {
      background: #900;
      transform: scale(1.1);
    }
    
    .table-fullscreen-body {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }
    
    .table-fullscreen-body .data-table {
      font-size: 12px;
    }
    
    .table-fullscreen-body .data-table th,
    .table-fullscreen-body .data-table td {
      padding: 12px 16px;
    }
    
    /* Botón maximizar en tablas */
    .btn-maximize {
      background: transparent;
      border: 1px solid var(--sap-border);
      color: var(--sap-gray);
      width: 28px;
      height: 28px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: auto;
    }
    
    .btn-maximize:hover {
      background: var(--sap-blue);
      color: #fff;
      border-color: var(--sap-blue);
    }
    
    @media (max-width: 1400px) {
      .kpi-grid { grid-template-columns: repeat(3, 1fr); }
      .charts-grid { grid-template-columns: repeat(2, 1fr); }
    }
    
    @media (max-width: 1024px) {
      .sap-shell { grid-template-columns: 1fr; }
      .sap-sidebar { display: none; }
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .tables-grid { grid-template-columns: 1fr; }
    }
  </style>
