<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Control de Stock — VDA</title>
  <meta name="theme-color" content="#1F2937">
  <base target="_top">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800&display=swap');
    :root{
      --primary:#059669; --primary-dark:#047857; --primary-light:#ecfdf5;
      --secondary:#1f2937; --secondary-dark:#111827; --secondary-light:#f9fafb;
      --accent:#3b82f6; --success:#10b981; --warning:#f59e0b; --danger:#ef4444; --info:#06b6d4;
      --bg:#ffffff; --bg-secondary:#f8fafc; --card:#ffffff; --text:#1f2937; --text-light:#6b7280; --text-muted:#9ca3af;
      --border:#e5e7eb; --border-light:#f3f4f6;
      --shadow:0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md:0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -1px rgba(0,0,0,.06);
      --shadow-lg:0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
      --shadow-xl:0 20px 25px -5px rgba(0,0,0,.1), 0 10px 10px -5px rgba(0,0,0,.04);
      --radius:12px; --radius-lg:16px; --radius-xl:20px;
      --font-family:'Inter',system-ui; --font-display:'Playfair Display',serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-family);background:var(--bg-secondary);color:var(--text);line-height:1.6;font-size:14px;min-height:100vh}
    .container{max-width:1800px;margin:0 auto;padding:24px}
    
    .executive-header{background:linear-gradient(135deg,var(--secondary),var(--secondary-dark));color:#fff;padding:32px;border-radius:var(--radius-xl);margin-bottom:32px;box-shadow:var(--shadow-xl);position:relative;overflow:hidden}
    .executive-header::before{content:'';position:absolute;inset:0;background:linear-gradient(45deg,rgba(5,150,105,.1) 0%,transparent 50%)}
    .header-main{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:24px}
    .logo-section{display:flex;align-items:center;gap:12px}
    .vda-logo{font-family:var(--font-display);font-size:32px;font-weight:700;letter-spacing:4px}
    .vda-subtitle{font-family:var(--font-display);font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.8);text-transform:uppercase}
    .status-indicator{display:flex;align-items:center;gap:8px;background:rgba(5,150,105,.2);padding:10px 16px;border-radius:var(--radius);border:1px solid rgba(5,150,105,.3);font-size:13px;font-weight:600}
    .status-dot{width:8px;height:8px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

    .filters-section{background:#fff;border-radius:var(--radius-lg);padding:24px;margin-bottom:24px;box-shadow:var(--shadow-md);border:1px solid var(--border)}
    .filters-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;align-items:end}
    .form-group{display:flex;flex-direction:column;gap:6px}
    .form-label{font-weight:700;font-size:12px;color:var(--text);text-transform:uppercase;letter-spacing:.5px}
    .form-input,.form-select{padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius);font-size:14px;transition:.2s;background:#fff}
    .form-input:focus,.form-select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(5,150,105,.1)}

    .nav-container{background:#fff;border-radius:var(--radius-lg);padding:8px;margin-bottom:20px;box-shadow:var(--shadow-md);border:1px solid var(--border)}
    .nav-tabs{display:flex;gap:4px}
    .nav-tab{background:transparent;border:none;padding:16px 24px;border-radius:var(--radius);cursor:pointer;font-weight:600;font-size:14px;transition:.3s;color:var(--text-light)}
    .nav-tab:hover{background:var(--primary-light);color:var(--primary)}
    .nav-tab.active{background:var(--primary);color:#fff;box-shadow:var(--shadow-md)}

    .content-card{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow-md);border:1px solid var(--border);overflow:hidden}
    .content-header{padding:24px 28px 20px;background:linear-gradient(135deg,#f8f9fa,#fff);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .content-title{font-size:20px;font-weight:700;margin:0;color:var(--text);display:flex;align-items:center;gap:12px}
    .content-body{padding:0}

    .table-container{overflow-x:auto}
    .stock-table{width:100%;border-collapse:collapse;font-size:13px}
    .stock-table th{background:linear-gradient(135deg,var(--secondary),var(--secondary-dark));color:#fff;padding:16px 12px;text-align:left;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;user-select:none;white-space:nowrap}
    .stock-table td{padding:16px 12px;border-bottom:1px solid var(--border-light);vertical-align:middle;white-space:nowrap}
    .stock-table tr:hover{background:var(--primary-light)}
    .stock-table tr:last-child td{border-bottom:none}
    .th-sort::after{content:' ⬍';opacity:.6;font-weight:400}
    .th-sort.asc::after{content:' ▲'}
    .th-sort.desc::after{content:' ▼'}

    .estado-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;white-space:nowrap}
    .estado-ok{background:rgba(16,185,129,.1);color:#059669;border:1px solid rgba(16,185,129,.2)}
    .estado-critico{background:rgba(245,158,11,.1);color:#d97706;border:1px solid rgba(245,158,11,.2)}
    .estado-agotado{background:rgba(107,114,128,.1);color:#374151;border:1px solid rgba(107,114,128,.2)}
    .estado-negativo{background:rgba(239,68,68,.1);color:#dc2626;border:1px solid rgba(239,68,68,.2)}

    .btn{padding:12px 20px;border:none;border-radius:var(--radius);font-weight:600;cursor:pointer;font-size:14px;transition:.2s;display:inline-flex;align-items:center;gap:8px;text-decoration:none}
    .btn-primary{background:var(--primary);color:#fff;box-shadow:var(--shadow-md)}
    .btn-primary:hover{background:var(--primary-dark);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
    .btn-secondary{background:var(--secondary-light);color:var(--text);border:2px solid var(--border)}
    .btn-secondary:hover{background:#fff;border-color:var(--primary);color:var(--primary)}
    .btn-warning{background:var(--warning);color:#fff}
    .btn-warning:hover{background:#d97706;transform:translateY(-2px)}

    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:24px}
    .kpi-card{background:linear-gradient(135deg,#fff,#f8f9fb);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow-md);text-align:center}
    .kpi-value{font-size:32px;font-weight:800;color:var(--primary);margin-bottom:8px}
    .kpi-label{font-size:13px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-weight:600}
    .kpi-change{font-size:12px;color:var(--text-light);margin-top:4px}

    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:20px}
    .modal-content{background:#fff;border-radius:var(--radius-lg);max-width:1200px;max-height:90vh;overflow:auto;box-shadow:var(--shadow-xl);width:100%}
    .modal-header{padding:24px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,var(--primary-light),#fff)}
    .modal-title{margin:0;font-size:20px;font-weight:800;color:var(--primary);display:flex;align-items:center;gap:12px}
    .modal-body{padding:32px}
    .modal-footer{padding:20px 32px;border-top:1px solid var(--border);display:flex;gap:12px;justify-content:flex-end;background:linear-gradient(135deg,#f8fafc,#fff)}

    .loading-container{text-align:center;padding:60px 20px;color:var(--text-muted)}
    .loading-spinner{width:40px;height:40px;border:4px solid var(--border);border-top:4px solid var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
    @keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
    .empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
    .empty-icon{font-size:64px;margin-bottom:20px;opacity:0.4}
    .empty-text{font-size:18px;font-weight:600;font-style:italic}
    .error-message{text-align:center;padding:40px;color:var(--danger);background:rgba(239,68,68,.1);border-radius:var(--radius);margin:20px}

    .detail-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:24px;margin-bottom:24px}
    .detail-card{background:linear-gradient(135deg,#f8f9fb,#fff);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
    .detail-card h4{color:var(--primary);margin-bottom:16px;font-weight:700}
    .detail-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #eef2f7}
    .detail-row:last-child{border-bottom:none;padding-bottom:0}
    .detail-label{font-size:14px;color:var(--text-muted);font-weight:600}
    .detail-value{font-size:14px;color:var(--text);font-weight:500;text-align:right}

    .super-section{margin-top:24px}
    .super-section h4{color:var(--secondary);margin-bottom:16px;font-weight:700;display:flex;align-items:center;gap:8px}
    .super-badge{background:rgba(59,130,246,.1);color:#3b82f6;padding:4px 8px;border-radius:6px;font-size:11px;font-weight:600}

    @media (max-width: 768px){
      .container{padding:16px}
      .detail-grid{grid-template-columns:1fr}
      .stock-table{min-width:1200px}
      .kpi-grid{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
      .filters-grid{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="executive-header">
      <div class="header-main">
        <div class="logo-section">
          <div class="vda-logo">VDA</div>
          <div class="vda-subtitle">Viña de Aguirre</div>
        </div>
        <div class="status-indicator"><div class="status-dot"></div><span>Sistema en línea</span></div>
      </div>
    </div>

    <div class="filters-section">
      <div class="filters-grid">
        <div class="form-group">
          <label class="form-label">ESTADO</label>
          <select class="form-select" id="filtro-estado">
            <option value="TODOS">Todos los estados</option>
            <option value="NEGATIVO">Stock Negativo</option>
            <option value="AGOTADO">Agotado</option>
            <option value="CRITICO">Crítico (≤10)</option>
            <option value="OK">Stock OK</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">SKU / PRODUCTO</label>
          <input type="text" class="form-input" id="filtro-sku" placeholder="Buscar por SKU o nombre...">
        </div>
        <div class="form-group">
          <label class="form-label">VISTA</label>
          <select class="form-select" id="filtro-vista">
            <option value="TODOS">Todos los productos</option>
            <option value="PROBLEMAS">Solo problemas</option>
          </select>
        </div>
        <div class="form-group">
          <button class="btn btn-primary" id="btn-filtrar">Filtrar</button>
        </div>
        <div class="form-group">
          <button class="btn btn-warning" id="btn-debug">Debug Stock</button>
        </div>
      </div>
    </div>

    <div class="nav-container">
      <div class="nav-tabs">
        <button class="nav-tab" onclick="showPanel(event,'dashboard')">Dashboard</button>
        <button class="nav-tab active" onclick="showPanel(event,'detalle')">Detalle de Stock</button>
      </div>
    </div>

    <div id="dashboard" class="panel" style="display:none;">
      <div class="kpi-grid" id="kpi-grid">
        <div class="loading-container"><div class="loading-spinner"></div><div>Cargando KPIs...</div></div>
      </div>
    </div>

    <div id="detalle" class="panel">
      <div class="content-card">
        <div class="content-header">
          <h2 class="content-title">Detalle de Stock por Producto</h2>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-secondary" onclick="refrescar()">Actualizar</button>
          </div>
        </div>
        <div class="content-body">
          <div id="detalle-content">
            <div class="loading-container"><div class="loading-spinner"></div><div>Cargando productos...</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Detalle SKU -->
  <div id="modal-detalle-sku" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title">Detalle de SKU</div>
        <button class="btn btn-secondary" onclick="cerrarModal()">Cerrar</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <script>
    // ==================== ESTADO GLOBAL ====================
    let DATA_ALL = [];
    let datosDetalle = [];
    let sortState = { key: 'stockDisponible', dir: 'asc' };

    // ==================== HELPERS ====================
    const hasGS = () => !!(window.google && google.script && google.script.run);
    const formatNumber = (num) => Number(num || 0).toLocaleString('es-CL');
    const formatPercent = (num) => (Number(num || 0)).toFixed(1) + '%';
    const esc = (s) => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));

    // ==================== INICIALIZACIÓN ====================
    document.addEventListener('DOMContentLoaded', () => {
      cargarTodo();
      setupEventListeners();
    });

    function setupEventListeners() {
      let debounceTimer;
      const debounce = (fn) => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(fn, 200);
      };

      document.getElementById('filtro-estado').addEventListener('change', () => debounce(aplicarFiltrosLocal));
      document.getElementById('filtro-vista').addEventListener('change', () => debounce(aplicarFiltrosLocal));
      document.getElementById('filtro-sku').addEventListener('input', () => debounce(aplicarFiltrosLocal));
      document.getElementById('btn-filtrar').addEventListener('click', aplicarFiltrosLocal);
      document.getElementById('btn-debug').addEventListener('click', testearLectura);

      // Modal events
      document.addEventListener('click', (e) => {
        if (e.target.classList.contains('modal')) cerrarModal();
      });
    }

    // ==================== NAVEGACIÓN ====================
    function showPanel(evt, id) {
      document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.getElementById(id).style.display = 'block';
      if (evt && evt.currentTarget) evt.currentTarget.classList.add('active');

      if (id === 'dashboard') cargarDashboard();
      if (id === 'detalle' && DATA_ALL.length === 0) cargarTodo();
    }
    window.showPanel = showPanel;

    // ==================== CARGA DE DATOS ====================
    function cargarTodo() {
      if (!hasGS()) {
        document.getElementById('detalle-content').innerHTML = `<div class="error-message">No se puede conectar con Google Apps Script</div>`;
        return;
      }

      document.getElementById('detalle-content').innerHTML = `<div class="loading-container"><div class="loading-spinner"></div><div>Cargando productos...</div></div>`;
      
      google.script.run
        .withSuccessHandler(res => {
          DATA_ALL = (res && res.ok) ? (res.productos || []) : [];
          aplicarFiltrosLocal();
          cargarDashboard();
        })
        .withFailureHandler(err => {
          document.getElementById('detalle-content').innerHTML = `<div class="error-message">Error al cargar: ${esc(err.message || err)}</div>`;
        })
        .apiStockGetAll();
    }

    function refrescar() {
      if (!hasGS()) return;
      document.getElementById('detalle-content').innerHTML = `<div class="loading-container"><div class="loading-spinner"></div><div>Actualizando...</div></div>`;
      google.script.run
        .withSuccessHandler(() => cargarTodo())
        .withFailureHandler(err => {
          document.getElementById('detalle-content').innerHTML = `<div class="error-message">Error al actualizar: ${esc(err.message || err)}</div>`;
        })
        .apiInvalidateCache();
    }
    window.refrescar = refrescar;

    // ==================== DASHBOARD ====================
    function cargarDashboard() {
      if (!hasGS()) return;
      google.script.run
        .withSuccessHandler(mostrarDashboard)
        .withFailureHandler(e => {
          document.getElementById('kpi-grid').innerHTML = `<div class="error-message">Error al cargar dashboard: ${esc(e.message || e)}</div>`;
        })
        .apiStockGetDashboard();
    }

    function mostrarDashboard(data) {
      if (!data || !data.ok) return;
      const kpis = data.kpis;
      document.getElementById('kpi-grid').innerHTML = `
        <div class="kpi-card">
          <div class="kpi-value">${formatNumber(kpis.totalSKUs || 0)}</div>
          <div class="kpi-label">Total Productos</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value">${formatNumber(kpis.totalStockFisico || 0)}</div>
          <div class="kpi-label">Stock Físico Total</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value">${formatNumber(kpis.totalComprometido || 0)}</div>
          <div class="kpi-label">Stock Comprometido</div>
          <div class="kpi-change">${formatPercent(kpis.porcentajeComprometido || 0)} del total</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value">${formatNumber(kpis.totalDisponible || 0)}</div>
          <div class="kpi-label">Stock Disponible</div>
          <div class="kpi-change">${formatPercent(kpis.porcentajeDisponible || 0)} del total</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value" style="color:var(--danger)">${formatNumber(kpis.stockNegativos || 0)}</div>
          <div class="kpi-label">Stock Negativo</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value" style="color:var(--warning)">${formatNumber(kpis.stockCriticos || 0)}</div>
          <div class="kpi-label">Stock Crítico</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value" style="color:var(--info)">${formatNumber(kpis.totalOCNoFacturadas || 0)}</div>
          <div class="kpi-label">OC No Facturadas</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value" style="color:var(--accent)">${formatNumber(kpis.totalOCFacturasNoDespachadas || 0)}</div>
          <div class="kpi-label">Fact. Super No Desp.</div>
        </div>`;
    }

    // ==================== FILTROS ====================
    function aplicarFiltrosLocal() {
      const estado = document.getElementById('filtro-estado').value;
      const vista = document.getElementById('filtro-vista').value;
      const q = (document.getElementById('filtro-sku').value || '').toLowerCase().trim();

      let arr = DATA_ALL.slice();

      if (estado && estado !== 'TODOS') {
        arr = arr.filter(x => x.estado === estado);
      }

      if (q) {
        arr = arr.filter(x => 
          (x.sku || '').toLowerCase().includes(q) || 
          (x.nombreProducto || '').toLowerCase().includes(q)
        );
      }

      if (vista === 'PROBLEMAS') {
        arr = arr.filter(x => ['NEGATIVO', 'AGOTADO', 'CRITICO'].includes(x.estado));
      }

      datosDetalle = arr;
      sortState = { key: 'stockDisponible', dir: 'asc' };
      ordenarYRender();
    }
    window.aplicarFiltrosLocal = aplicarFiltrosLocal;

    // ==================== TABLA ====================
    function ordenarPor(key) {
      if (sortState.key === key) {
        sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
      } else {
        sortState.key = key;
        sortState.dir = ['sku', 'nombreProducto', 'estado'].includes(key) ? 'asc' : 'desc';
      }
      ordenarYRender();
    }
    window.ordenarPor = ordenarPor;

    function ordenarYRender() {
      const { key, dir } = sortState;
      const sorted = datosDetalle.slice().sort((a, b) => {
        const va = a[key], vb = b[key];
        const isNum = typeof va === 'number' && typeof vb === 'number';
        if (isNum) return dir === 'asc' ? va - vb : vb - va;
        const sa = String(va || '').localeCompare(String(vb || ''), 'es', { numeric: true });
        return dir === 'asc' ? sa : -sa;
      });
      renderTablaDetalle(sorted);
    }

    function sortClassFor(key) {
      return 'th-sort ' + (sortState.key === key ? sortState.dir : '');
    }

    function renderTablaDetalle(productos) {
      if (!productos || !productos.length) {
        document.getElementById('detalle-content').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📦</div>
            <div class="empty-text">No se encontraron productos con los filtros aplicados</div>
          </div>`;
        return;
      }

      const table = `
        <div class="table-container">
          <table class="stock-table">
            <thead>
              <tr>
                <th class="${sortClassFor('sku')}" onclick="ordenarPor('sku')">SKU</th>
                <th class="${sortClassFor('nombreProducto')}" onclick="ordenarPor('nombreProducto')">Producto</th>
                <th class="${sortClassFor('stockFisico')}" onclick="ordenarPor('stockFisico')">Stock Físico</th>
                <th class="${sortClassFor('nvPendientes')}" onclick="ordenarPor('nvPendientes')">NV Pendientes</th>
                <th class="${sortClassFor('facturasNoDespachadas')}" onclick="ordenarPor('facturasNoDespachadas')">Fact. No Desp.</th>
                <th class="${sortClassFor('ocNoFacturadas')}" onclick="ordenarPor('ocNoFacturadas')">OC No Fact.</th>
                <th class="${sortClassFor('ocFacturasNoDespachadas')}" onclick="ordenarPor('ocFacturasNoDespachadas')">Fact. Super No Desp.</th>
                <th class="${sortClassFor('stockComprometido')}" onclick="ordenarPor('stockComprometido')">Comprometido</th>
                <th class="${sortClassFor('stockDisponible')}" onclick="ordenarPor('stockDisponible')">Disponible</th>
                <th class="${sortClassFor('estado')}" onclick="ordenarPor('estado')">Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              ${productos.map(p => renderFilaProducto(p)).join('')}
            </tbody>
          </table>
        </div>`;
      document.getElementById('detalle-content').innerHTML = table;
    }

    function renderFilaProducto(p){
      const colorDisp = p.stockDisponible < 0
        ? 'var(--danger)'
        : p.stockDisponible <= 10 ? 'var(--warning)' : 'var(--success)';

      return `
        <tr>
          <td><strong>${esc(p.sku)}</strong></td>
          <td>${esc(p.nombreProducto || '')}</td>
          <td>${formatNumber(p.stockFisico)}</td>
          <td>${formatNumber(p.nvPendientes)}</td>
          <td>${formatNumber(p.facturasNoDespachadas)}</td>
          <td style="color:var(--info);font-weight:600">${formatNumber(p.ocNoFacturadas || 0)}</td>
          <td style="color:var(--accent);font-weight:600">${formatNumber(p.ocFacturasNoDespachadas || 0)}</td>
          <td>${formatNumber(p.stockComprometido)}</td>
          <td style="font-weight:600;color:${colorDisp}">${formatNumber(p.stockDisponible)}</td>
          <td>${getEstadoBadge(p.estado)}</td>
          <!-- SKU pasa seguro usando JSON.stringify -->
          <td><button class="btn btn-secondary" onclick='verDetalleSKU(${JSON.stringify(p.sku)})'>Ver</button></td>
        </tr>`;
    }



    function getEstadoBadge(estado) {
      const clases = {
        'OK': 'estado-ok',
        'CRITICO': 'estado-critico',
        'AGOTADO': 'estado-agotado',
        'NEGATIVO': 'estado-negativo'
      };
      const cls = clases[estado] || '';
      return `<span class="estado-badge ${cls}">${esc(estado)}</span>`;
    }

    // ==================== MODAL DETALLE ====================
    function verDetalleSKU(sku){
    if (!hasGS()) return;
    sku = String(sku || '').trim();

    document.getElementById('modal-detalle-sku').style.display = 'flex';
    document.getElementById('modal-body').innerHTML = `
      <div class="loading-container">
        <div class="loading-spinner"></div>
        <div>Cargando detalle...</div>
      </div>`;

    google.script.run
      .withSuccessHandler(res => {
        if (!res || res.ok !== true) {
          // Muestra siempre el mensaje que venga del backend
          const msg = (res && res.error) ? res.error : 'Respuesta vacía del servidor';
          return mostrarErrorDetalleSKU(msg);
        }
        mostrarDetalleSKU(res);
      })
      .withFailureHandler(err => {
        const msg = (err && (err.message || err.toString())) || 'Fallo de invocación';
        mostrarErrorDetalleSKU(msg);
      })
      .apiStockGetDetalleSKU(sku);
  }

  function mostrarErrorDetalleSKU(err){
    console.error('Detalle SKU - error:', err);
    const msg = (err && (err.message || err.toString())) || 'Error desconocido';
    document.getElementById('modal-body').innerHTML =
      `<div class="error-message">Error al cargar detalle: ${esc(msg)}</div>`;
  }


    window.verDetalleSKU = verDetalleSKU;

    function mostrarDetalleSKU(res) {
      if (!res || !res.ok) {
        return mostrarErrorDetalleSKU(res?.error || 'Error desconocido');
      }

      const d = res.detalle;
      const pendientes = (d.facturas || []).filter(f => Number(f.pendiente) > 0.0001);

      let facturasHTML = '';
      if (pendientes.length) {
        facturasHTML = `
          <div class="detail-card" style="margin-top:24px;">
            <h4>Facturas Regulares Pendientes de Despacho</h4>
            <div class="table-container">
              <table class="stock-table">
                <thead>
                  <tr>
                    <th>N° Factura</th>
                    <th>Cliente</th>
                    <th>Despachado</th>
                    <th>Pendiente</th>
                    <th>Tipo</th>
                  </tr>
                </thead>
                <tbody>
                  ${pendientes.map(f => `
                    <tr>
                      <td>${esc(f.factura)}</td>
                      <td>${esc(f.cliente || '')}</td>
                      <td>${formatNumber(f.despachado)}</td>
                      <td>${formatNumber(f.pendiente)}</td>
                      <td><span class="super-badge">${esc(f.tipo || 'NV')}</span></td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>`;
      }

      let supermercadosHTML = '';
      if (d.supermercados && (d.supermercados.ordenesNoFacturadas.length > 0 || d.supermercados.facturasNoDespachadas.length > 0)) {
        let ordenesNoFactHTML = '';
        if (d.supermercados.ordenesNoFacturadas.length > 0) {
          ordenesNoFactHTML = `
            <div class="detail-card">
              <h4>Órdenes de Compra No Facturadas</h4>
              <div class="table-container">
                <table class="stock-table">
                  <thead>
                    <tr>
                      <th>N° Orden</th>
                      <th>Comprador</th>
                      <th>Fecha</th>
                      <th>Ordenadas</th>
                      <th>Facturadas</th>
                      <th>Pendientes</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${d.supermercados.ordenesNoFacturadas.map(o => `
                      <tr>
                        <td>${esc(o.nOrden)}</td>
                        <td>${esc(o.comprador)}</td>
                        <td>${esc(o.fecha)}</td>
                        <td>${formatNumber(o.cajasOrdenadas)}</td>
                        <td>${formatNumber(o.cajasFacturadas)}</td>
                        <td style="color:var(--info);font-weight:600">${formatNumber(o.cajasPendientes)}</td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            </div>`;
        }

        let facturasNoDesp = '';
        if (d.supermercados.facturasNoDespachadas.length > 0) {
          facturasNoDesp = `
            <div class="detail-card">
              <h4>Facturas Supermercados No Despachadas</h4>
              <div class="table-container">
                <table class="stock-table">
                  <thead>
                    <tr>
                      <th>N° Orden</th>
                      <th>Factura</th>
                      <th>Comprador</th>
                      <th>Cajas Fact.</th>
                      <th>Valor Fact.</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${d.supermercados.facturasNoDespachadas.map(f => `
                      <tr>
                        <td>${esc(f.nOrden)}</td>
                        <td>${esc(f.factura)}</td>
                        <td>${esc(f.comprador)}</td>
                        <td style="color:var(--accent);font-weight:600">${formatNumber(f.cajasFacturadas)}</td>
                        <td>$${formatNumber(f.valorFacturado)}</td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            </div>`;
        }

        supermercadosHTML = `
          <div class="super-section">
            <h4><span class="super-badge">SUPERMERCADOS</span> Compromisos Específicos</h4>
            <div style="display:grid;gap:16px;">
              ${ordenesNoFactHTML}
              ${facturasNoDesp}
            </div>
          </div>`;
      }

      document.getElementById('modal-body').innerHTML = `
        <div class="detail-grid">
          <div class="detail-card">
            <h4>Información del Producto</h4>
            <div class="detail-row">
              <span class="detail-label">SKU:</span>
              <span class="detail-value"><strong>${esc(d.sku)}</strong></span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Producto:</span>
              <span class="detail-value">${esc(d.nombreProducto || '')}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Estado:</span>
              <span class="detail-value">${getEstadoBadge(d.estado)}</span>
            </div>
          </div>
          <div class="detail-card">
            <h4>Stock Actual</h4>
            <div class="detail-row">
              <span class="detail-label">Stock Físico:</span>
              <span class="detail-value">${formatNumber(d.stockFisico)} cajas</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">NV Pendientes:</span>
              <span class="detail-value">${formatNumber(d.nvPendientes)} cajas</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Fact. No Desp.:</span>
              <span class="detail-value">${formatNumber(d.facturasNoDespachadas)} cajas</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">OC No Facturadas:</span>
              <span class="detail-value" style="color:var(--info);font-weight:600">${formatNumber(d.ocNoFacturadas || 0)} cajas</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Fact. Super No Desp.:</span>
              <span class="detail-value" style="color:var(--accent);font-weight:600">${formatNumber(d.ocFacturasNoDespachadas || 0)} cajas</span>
            </div>
            <div class="detail-row" style="border-top:2px solid var(--primary);padding-top:12px;margin-top:12px;">
              <span class="detail-label"><strong>Stock Disponible:</strong></span>
              <span class="detail-value" style="font-weight:700;color:${d.stockDisponible < 0 ? 'var(--danger)' : d.stockDisponible <= 10 ? 'var(--warning)' : 'var(--success)'}">${formatNumber(d.stockDisponible)} cajas</span>
            </div>
          </div>
        </div>
        ${facturasHTML}
        ${supermercadosHTML}`;
    }

    function mostrarErrorDetalleSKU(err){
      console.error('Detalle SKU - error:', err);
      const msg = (err && (err.message || err.toString())) || 'Error desconocido';
      document.getElementById('modal-body').innerHTML =
        `<div class="error-message">Error al cargar detalle: ${esc(msg)}</div>`;
    }


    function cerrarModal() {
      document.getElementById('modal-detalle-sku').style.display = 'none';
    }
    window.cerrarModal = cerrarModal;

    // ==================== DEBUG ====================
    function testearLectura() {
      if (!hasGS()) {
        alert('No se puede conectar con Google Apps Script');
        return;
      }

      google.script.run
        .withSuccessHandler(res => {
          const msg = `
✅ SISTEMA FUNCIONANDO

📊 Productos Analizados: ${(res?.resumen?.productosAnalizados) || '-'}
🏪 OC No Facturadas: ${(res?.kpis?.totalOCNoFacturadas) || 0}
📋 Fact. Super No Desp.: ${(res?.kpis?.totalOCFacturasNoDespachadas) || 0}
💾 Cache Activo: ${res?.cache ? 'Sí' : 'No'}

Hora: ${new Date().toLocaleString('es-CL')}`;
          alert(msg);
          console.log('Debug completo:', res);
        })
        .withFailureHandler(err => {
          alert(`❌ Error: ${err.message || err}`);
        })
        .apiStockTest();
    }
    window.testearLectura = testearLectura;
  </script>
</body>
</html>
